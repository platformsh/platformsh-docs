name: Auto Update Regions

on:
  schedule:
    - cron: '0 0 */3 * *' # Every 3 days at midnight UTC
  workflow_dispatch:

env:
  PLATFORMSH_CLI_NO_INTERACTION: 1
  PLATFORMSH_CLI_DEFAULT_TIMEOUT: 60 # Increase timeout for CLI commands

jobs:
  update-regions:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'platformsh' }}
    env:
      PLATFORMSH_CLI_TOKEN: ${{ secrets.PLATFORMSH_CLI_TOKEN }}
    steps:
      - name: Setup Platformsh CLI
        uses: upsun/action-cli@v1
        with:
          cli_provider: 'platform'

      - name: Checkout default branch
        uses: actions/checkout@v4

      - name: Download latest regions_location.json
        run: |
          regions_response="$(mktemp)"
          trap 'rm -f "${regions_response}"' EXIT

          for attempt in {1..5}; do
            if platform api:curl regions > "${regions_response}"; then
              break
            fi

            if [ "${attempt}" -eq 5 ]; then
              echo "::error::Unable to retrieve regions after ${attempt} attempts."
              exit 1
            fi

            sleep_seconds=$((attempt * 30))
            echo "::warning::Unable to retrieve regions. Retrying in ${sleep_seconds}s. Attempt ${attempt} of 5 failed."
            platform clear-cache || true
            sleep "${sleep_seconds}"
          done

          jq '[ .regions[] | select(.available and .private == false and .provider.name != "none") |  {"name": .id, "provider": .provider.name, "zone": .zone,"timezone": .timezone} ] | sort_by(.name)' "${regions_response}" > ./shared/data/regions_location.json

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.WORKFLOW_TOKEN }}
          delete-branch: true
          branch: update-regions-locations
          title: Automated update of regions
          body: |
            Region locations have updated.
          add-paths: |
            shared/data/regions_location.json
